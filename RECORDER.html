<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBBLER RECORDER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
  gap: 18px;
}

h1 {
  font-size: 1.3rem;
  letter-spacing: 0.15em;
  color: #ff6633;
  text-transform: uppercase;
}

#device-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 720px;
}

#device-select {
  flex: 1;
  padding: 10px 14px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: #ccc;
  font-size: 0.9rem;
  cursor: pointer;
}

#refresh-btn {
  padding: 10px 14px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: #888;
  cursor: pointer;
  font-size: 0.85rem;
  white-space: nowrap;
}
#refresh-btn:hover { border-color: #555; color: #aaa; }

/* VU METER */
#vu-wrap {
  width: 100%;
  max-width: 720px;
  height: 14px;
  background: #111;
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid #222;
}
#vu-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22aa44, #aacc00, #ff6600, #ff2200);
  border-radius: 7px;
  transition: width 0.05s;
}

/* BIG RECORD BUTTON */
#record-btn {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 4px solid #333;
  background: #1a1a1a;
  color: #ff3333;
  font-size: 3rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}
#record-btn:hover { border-color: #ff3333; }
#record-btn.recording {
  border-color: #ff3333;
  background: #2a0a0a;
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,50,50,0.5); }
  50% { box-shadow: 0 0 0 24px rgba(255,50,50,0); }
}

#timer {
  font-size: 1.6rem;
  font-variant-numeric: tabular-nums;
  color: #ff5533;
  min-height: 2rem;
  letter-spacing: 0.1em;
}

#status {
  font-size: 0.85rem;
  color: #666;
  min-height: 1.2em;
}

/* RECORDINGS LIST */
#recordings {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rec-item {
  background: #141414;
  border: 1px solid #252525;
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.rec-item audio { flex: 1; height: 36px; }
.rec-meta { font-size: 0.78rem; color: #666; white-space: nowrap; }
.rec-save {
  padding: 7px 14px;
  background: #1a2a1a;
  border: 1px solid #2a4a2a;
  border-radius: 6px;
  color: #5a5;
  font-size: 0.82rem;
  cursor: pointer;
  white-space: nowrap;
}
.rec-save:hover { background: #1e341e; }
.rec-del {
  padding: 7px 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 6px;
  color: #555;
  font-size: 0.82rem;
  cursor: pointer;
}
.rec-del:hover { color: #aa4444; border-color: #553333; }

/* TRANSCRIPT */
#transcript-wrap {
  width: 100%;
  max-width: 720px;
}
#transcript-label {
  font-size: 0.75rem;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
#transcript {
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 16px;
  min-height: 100px;
  font-size: 0.95rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  outline: none;
  color: #ccc;
}
#transcript:empty::before { content: 'Transcript appears here...'; color: #333; }
.interim-text { color: #666; font-style: italic; }

#tx-btns {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.tx-btn {
  padding: 8px 16px;
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 7px;
  color: #888;
  font-size: 0.85rem;
  cursor: pointer;
}
.tx-btn:hover { border-color: #444; color: #bbb; }
.tx-btn.ok { background: #0d1f0d; border-color: #2a4a2a; color: #5a5; }
</style>
</head>
<body>

<h1>Cobbler Recorder</h1>

<div id="device-row">
  <select id="device-select"><option>Loading mics...</option></select>
  <button id="refresh-btn" onclick="loadDevices()">Refresh</button>
</div>

<div id="vu-wrap"><div id="vu-bar"></div></div>

<button id="record-btn" onclick="toggleRecord()">&#9679;</button>
<div id="timer"></div>
<div id="status">Pick your mic, hit record</div>

<div id="recordings"></div>

<div id="transcript-wrap">
  <div id="transcript-label">Transcript</div>
  <div id="transcript" contenteditable="true"></div>
  <div id="tx-btns">
    <button class="tx-btn" onclick="copyTranscript()">Copy</button>
    <button class="tx-btn" onclick="saveTranscript()">Save .txt</button>
    <button class="tx-btn" onclick="clearTranscript()">Clear</button>
  </div>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let stream = null;
let recording = false;
let timerInterval = null;
let seconds = 0;
let recCount = 0;

// VU meter
let analyser = null;
let vuInterval = null;
let audioCtx = null;
let wakeLock = null;
const vuBar = document.getElementById('vu-bar');

// Speech recognition
let recognition = null;
let finalTranscript = '';
const transcriptEl = document.getElementById('transcript');

const btn = document.getElementById('record-btn');
const statusEl = document.getElementById('status');
const timerEl = document.getElementById('timer');
const deviceSelect = document.getElementById('device-select');

// ── DEVICES ──────────────────────────────────────────────
async function loadDevices() {
  try {
    // Request permission first so labels appear
    const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
    tmp.getTracks().forEach(t => t.stop());
  } catch(e) {}

  const devices = await navigator.mediaDevices.enumerateDevices();
  const mics = devices.filter(d => d.kind === 'audioinput');
  deviceSelect.innerHTML = '';
  mics.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = d.deviceId;
    opt.textContent = d.label || `Mic ${i+1}`;
    deviceSelect.appendChild(opt);
  });
  if (mics.length === 0) {
    deviceSelect.innerHTML = '<option>No mics found</option>';
  }
  statusEl.textContent = `${mics.length} mic(s) found`;
}

// ── VU METER ─────────────────────────────────────────────
function startVU(stream) {
  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  // Keep context alive: connect to destination at zero gain
  const silentGain = audioCtx.createGain();
  silentGain.gain.value = 0;
  src.connect(silentGain);
  silentGain.connect(audioCtx.destination);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  vuInterval = setInterval(() => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    analyser.getByteFrequencyData(buf);
    const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
    vuBar.style.width = Math.min(100, avg * 2.5) + '%';
  }, 40);
}

function stopVU() {
  if (vuInterval) { clearInterval(vuInterval); vuInterval = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  vuBar.style.width = '0%';
}

// Resume audio context when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
});

// ── WAKE LOCK ─────────────────────────────────────────────
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', async () => {
  if (!document.hidden && recording && 'wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
});

// ── SPEECH RECOGNITION ───────────────────────────────────
function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    transcriptEl.innerHTML = finalTranscript +
      (interim ? `<span class="interim-text">${interim}</span>` : '');
  };
  recognition.onerror = (e) => { if (e.error !== 'no-speech') console.warn(e.error); };
  recognition.onend = () => { if (recording) try { recognition.start(); } catch(e) {} };
  try { recognition.start(); } catch(e) {}
}

function stopRecognition() {
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
}

// ── RECORD ───────────────────────────────────────────────
async function toggleRecord() {
  if (!recording) {
    const deviceId = deviceSelect.value;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: deviceId ? { deviceId: { exact: deviceId } } : true
      });
    } catch(e) {
      statusEl.textContent = 'Mic access denied: ' + e.message;
      return;
    }

    // Pick best format
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4']
      .find(m => MediaRecorder.isTypeSupported(m)) || '';

    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => saveRecording(mimeType);
    mediaRecorder.start(200);

    startVU(stream);
    startRecognition();
    requestWakeLock();

    recording = true;
    btn.classList.add('recording');
    btn.innerHTML = '&#9632;';
    seconds = 0;
    timerEl.textContent = '0:00';
    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = Math.floor(seconds/60) + ':' + String(seconds%60).padStart(2,'0');
    }, 1000);
    statusEl.textContent = 'Recording...';

  } else {
    recording = false;
    mediaRecorder.stop();
    stream.getTracks().forEach(t => t.stop());
    stopVU();
    stopRecognition();
    releaseWakeLock();
    clearInterval(timerInterval);
    btn.classList.remove('recording');
    btn.innerHTML = '&#9679;';
    statusEl.textContent = 'Saved — ready for next';
    timerEl.textContent = '';
  }
}

// ── SAVE RECORDING ───────────────────────────────────────
function saveRecording(mimeType) {
  recCount++;
  const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const ts = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const dur = seconds;

  const item = document.createElement('div');
  item.className = 'rec-item';
  item.innerHTML = `
    <audio src="${url}" controls></audio>
    <span class="rec-meta">#${recCount} &nbsp; ${ts}<br>${formatDur(dur)}</span>
    <button class="rec-save" onclick="downloadRec('${url}','${ext}',${recCount})">Save</button>
    <button class="rec-del" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('recordings').prepend(item);
}

function formatDur(s) {
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function downloadRec(url, ext, n) {
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  a.href = url;
  a.download = `recording_${n}_${ts}.${ext}`;
  a.click();
}

// ── TRANSCRIPT UTILS ─────────────────────────────────────
function copyTranscript() {
  const txt = transcriptEl.innerText.trim();
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.querySelectorAll('.tx-btn')[0];
    b.classList.add('ok'); b.textContent = 'Copied!';
    setTimeout(() => { b.classList.remove('ok'); b.textContent = 'Copy'; }, 1500);
  });
}

function saveTranscript() {
  const txt = transcriptEl.innerText.trim();
  if (!txt) return;
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `transcript_${ts}.txt`;
  a.click();
}

function clearTranscript() {
  finalTranscript = '';
  transcriptEl.innerHTML = '';
}

// ── INIT ─────────────────────────────────────────────────
loadDevices();
navigator.mediaDevices.addEventListener('devicechange', loadDevices);
</script>
</body>
</html>
